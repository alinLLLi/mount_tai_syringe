<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .syringe {
            position: absolute;
            width: 500px;
            height: 180px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            /* background: blueviolet; */
        }

        .syringe::after {
            content: "Made in Taiwan";
            position: absolute;
            width: 200px;
            height: 100px;
            font-size: 12px;
            color: #757575;
            top: 124px;
            left: 90px;
            z-index: 999;
        }

        .syringe_body {
            /*針筒*/
            position: absolute;
            width: 460px;
            height: 60px;
            top: 60px;
            left: 0px;
            border-radius: 0px 5px 5px 0px;
            border: 1px solid #b3b3b3;
            background: linear-gradient(0deg, #fff 0%, #afafaf 40%, #fff 100%);
            z-index: 2;
        }

        .syringe_body::after {
            /*針頭*/
            content: "";
            position: absolute;
            width: 38px;
            height: 1px;
            top: 30px;
            right: -38px;
            background: rgb(64, 64, 64);
            z-index: 1;
        }

        .syringe_body::before {
            /*針筒推蓋*/
            content: "";
            position: absolute;
            width: 40px;
            height: 100px;
            top: -20px;
            left: -2px;
            border-radius: 5px;
            background: linear-gradient(0deg, #fff 0%, #c2c2c2 40%, #fff 100%);
            border: 1px solid #b3b3b3;
            z-index: 1;
        }

        .syringe_medicine {
            position: absolute;
            width: 320px;
            height: 100px;
            top: 40px;
            left: 80px;
            background: linear-gradient(0deg, #fff 0%, #c2c2c2 40%, #fff 100%);
            border: 1px solid #b3b3b3;
            z-index: 20;
        }

        .syringe_medicine::before {
            content: "";
            position: absolute;
            width: 320px;
            height: 100px;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0)40%, rgba(0, 0, 0, 1)40%, rgba(0, 0, 0, 1)50%, rgba(255, 255, 0, 0.2)50%, rgba(255, 255, 0, 0.2)100%);
        }

        .syringe_medicine::after {
            content: "";
            position: absolute;
            width: 320px;
            height: 20px;
            top: 0;
            left: 0;
            z-index: 30;
            background-image: repeating-linear-gradient(90deg,
                    rgba(0, 0, 0, 0.3),
                    rgba(0, 0, 0, 0.3) 1px,
                    transparent 1px,
                    transparent 10px
                    /* 每10px一個單位 */
                );
            background-size: 100px 100%;
            /* 每個大單位距離 */
            background-position: 0 0;

            /* background: linear-gradient(90deg, transparent 99%, black 99%) repeat-x left top/10px 10px; */

            /* background: palevioletred; */
        }
    </style>
</head>

<body>
    <div class="syringe">
        <div class="syringe_medicine"></div>
        <div class="syringe_body"></div>
    </div>

</body>

</html>
